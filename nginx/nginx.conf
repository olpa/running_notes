server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location ~ ^/(record|note|auth|me)(/|$) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
