# PLAIN and LOGIN are allowed only after TLS has been established.
auth_allow_cleartext = no
# Logs failed auth attempts with useful reasons. Successful IMAP logins are
# visible through Dovecot imap-login Login lines in container logs.
auth_verbose = yes
auth_mechanisms = plain login

sql_driver = sqlite
sqlite_path = /state/users.db

passdb sql {
  query = SELECT imap_password_hash AS password \
    FROM users \
    WHERE imap_username = '%{user}' \
      AND status = 'active' \
      AND imap_password_hash != '!'
}

userdb sql {
  query = SELECT \
      1000 AS uid, \
      1000 AS gid, \
      '/var/mail/voiceinbox/users/' || id AS home, \
      '/var/mail/voiceinbox/users/' || id AS mail_path, \
      CASE WHEN is_guest = 1 THEN 'guest' ELSE '' END AS acl_groups \
    FROM users \
    WHERE imap_username = '%{user}' \
      AND status = 'active' \
      AND imap_password_hash != '!'

  iterate_query = SELECT imap_username AS user \
    FROM users \
    WHERE status = 'active' \
      AND imap_password_hash != '!'
}
