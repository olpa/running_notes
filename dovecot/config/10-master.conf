service imap-login {
  inet_listener imap {
    port = 143
  }

  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service lmtp {
  inet_listener lmtp {
    port = 24
  }
}

# Internal API used by the backend for read-only mailbox fetches.
service doveadm {
  inet_listener http {
    port = 8080
    ssl = no
  }
}

import_environment {
  DOVEADM_PASSWORD = %{env:DOVEADM_PASSWORD}
}
doveadm_api_key = %{env:DOVEADM_PASSWORD}
doveadm_allowed_commands = fetch
