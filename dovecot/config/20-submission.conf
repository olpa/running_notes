# Authenticate SMTP clients with the same passdb as IMAP, then proxy the
# transaction to the private sink. The sink rejects DATA and never receives a
# message body.
submission_relay_host = smtp-discard
submission_relay_port = 2525
submission_relay_trusted = no
submission_max_mail_size = 10M
submission_max_recipients = 10

service submission-login {
  inet_listener submission {
    port = 587
  }

  inet_listener submissions {
    port = 0
  }
}
