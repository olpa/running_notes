# Backend provisioning uses the same numeric UID/GID for Maildir ownership.
mail_driver = maildir
mail_path = /var/mail/voiceinbox
mail_uid = 1000
mail_gid = 1000
mailbox_list_layout = fs

# Apply the guest ACL only to IMAP sessions. LMTP deliberately does not load
# the plugin, so new recordings can still be delivered to the guest mailbox.
protocol imap {
  mail_plugins {
    acl = yes
  }
}

acl_driver = vfile
acl_globals_only = yes

namespace inbox {
  inbox = yes

  mailbox * {
    acl group-override=guest {
      rights = lr
    }
  }
}

# MVP2 SQL userdb must derive per-user mail paths as:
# /var/mail/voiceinbox/users/<user-id>
