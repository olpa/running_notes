services:
  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - frontend
    restart: unless-stopped

  boringproxy-client:
    image: debian:bookworm-slim
    entrypoint: ["/usr/local/bin/boringproxy"]
    command:
      - client
      - -server
      - "${BORINGPROXY_SERVER:-boringp.uucode.com}"
      - -user
      - "${BORINGPROXY_USER:-admin}"
      - -token
      - "${BORINGPROXY_TOKEN:?BORINGPROXY_TOKEN is required}"
      - -client-name
      - "${BORINGPROXY_CLIENT_NAME:-notes-dev}"
      - -cert-dir
      - /var/lib/boringproxy/certs
    volumes:
      - /mnt/HC_Volume_103849597/home/olpa/boringproxy/boringproxy:/usr/local/bin/boringproxy:ro
      - /etc/ssl/certs:/etc/ssl/certs:ro
      - ./boringproxy-certs:/var/lib/boringproxy/certs
    depends_on:
      - nginx
    networks:
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    image: running-notes-be
    environment:
      MAIL_UID: "1000"
      MAIL_GID: "1000"
      APP_ENV: "${APP_ENV:-development}"
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET is required}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-false}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI:-}"
      MICROSOFT_CLIENT_ID: "${MICROSOFT_CLIENT_ID:-}"
      MICROSOFT_CLIENT_SECRET: "${MICROSOFT_CLIENT_SECRET:-}"
      MICROSOFT_REDIRECT_URI: "${MICROSOFT_REDIRECT_URI:-}"
    volumes:
      - ./data:/data
      - ./state:/state
      - ./maildir:/var/mail/voiceinbox
    networks:
      - frontend
      - backend
    restart: unless-stopped

  dovecot:
    image: dovecot/dovecot:latest
    ports:
      - "127.0.0.1:143:143"   # IMAP
      - "127.0.0.1:993:993"   # IMAPS
    volumes:
      - ./dovecot/config:/etc/dovecot/conf.d
      - ./maildir:/var/mail/voiceinbox
      - ./state:/state:ro
    networks:
      - frontend
      - backend
    restart: unless-stopped

networks:
  frontend:
  backend:
    internal: true
