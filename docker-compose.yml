services:
  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:443:443"   # HTTPS (boringproxy TCP target)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ${TLS_CERTIFICATE_PATH:-./certs/letsencrypt/live/notes.handsfree.vc/fullchain.pem}:/etc/nginx/tls/fullchain.pem:ro
      - ${TLS_PRIVATE_KEY_PATH:-./certs/letsencrypt/live/notes.handsfree.vc/privkey.pem}:/etc/nginx/tls/privkey.pem:ro
    depends_on:
      - backend
    networks:
      - frontend
    restart: unless-stopped

  boringproxy-client:
    build:
      context: ./boringproxy
      args:
        BORINGPROXY_VERSION: "v0.10.0"
    image: running-notes-boringproxy:v0.10.0
    command:
      - client
      - -server
      - "${BORINGPROXY_SERVER:-boringp.uucode.com}"
      - -user
      - "${BORINGPROXY_USER:-admin}"
      - -token
      - "${BORINGPROXY_TOKEN:?BORINGPROXY_TOKEN is required}"
      - -client-name
      - "${BORINGPROXY_CLIENT_NAME:-notes-dev}"
      - -cert-dir
      - /var/lib/boringproxy/certs
    volumes:
      - ./boringproxy-certs:/var/lib/boringproxy/certs
    depends_on:
      - nginx
    networks:
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    image: running-notes-be
    environment:
      MAIL_UID: "1000"
      MAIL_GID: "1000"
      APP_ENV: "${APP_ENV:-development}"
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET is required}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-false}"
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-26214400}"
      MAX_USER_NOTE_BYTES: "${MAX_USER_NOTE_BYTES:-262144000}"
      MAX_USER_NOTES: "${MAX_USER_NOTES:-100}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost}"
      PUBLIC_IMAP_HOST: "${PUBLIC_IMAP_HOST:-}"
      PUBLIC_IMAP_PORT: "${PUBLIC_IMAP_PORT:-993}"
      PUBLIC_IMAP_SECURITY: "${PUBLIC_IMAP_SECURITY:-TLS}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI:-}"
      MICROSOFT_CLIENT_ID: "${MICROSOFT_CLIENT_ID:-}"
      MICROSOFT_CLIENT_SECRET: "${MICROSOFT_CLIENT_SECRET:-}"
      MICROSOFT_REDIRECT_URI: "${MICROSOFT_REDIRECT_URI:-}"
    volumes:
      - ./state:/state
      - ./maildir:/var/mail/voiceinbox
    networks:
      - frontend
      - backend
    restart: unless-stopped

  dovecot:
    image: dovecot/dovecot:2.4.4
    ports:
      - "127.0.0.1:143:143"   # IMAP
      - "127.0.0.1:993:993"   # IMAPS
    volumes:
      - ./dovecot/config:/etc/dovecot/conf.d
      - ${TLS_CERTIFICATE_PATH:-./certs/letsencrypt/live/notes.handsfree.vc/fullchain.pem}:/etc/dovecot/tls/fullchain.pem:ro
      - ${TLS_PRIVATE_KEY_PATH:-./certs/letsencrypt/live/notes.handsfree.vc/privkey.pem}:/etc/dovecot/tls/privkey.pem:ro
      - ./maildir:/var/mail/voiceinbox
      - ./state:/state:ro
    networks:
      - frontend
      - backend
    restart: unless-stopped

networks:
  frontend:
  backend:
    internal: true
